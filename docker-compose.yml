services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackezz
      POSTGRES_PASSWORD: trackezz
      POSTGRES_DB: trackezz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackezz -d trackezz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
